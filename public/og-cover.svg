      <stop offset="0%" stop-color="#0f3d2c"/>
      <stop offset="45%" stop-color="#1a5c45"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="glow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5b61e8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="48" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
