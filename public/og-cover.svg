    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="-40" r="320" fill="url(#glow)" opacity="0.9" filter="url(#blur)"/>
  <circle cx="80" cy="620" r="280" fill="#16805d" opacity="0.25" filter="url(#blur)"/>
